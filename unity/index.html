<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <!-- Full-viewport on every device (portrait-first phone game). viewport-fit=cover handles the iPhone notch/safe-area. -->
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>rpg-hero-legends-thai</title>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #081626; }
      /* The Unity canvas always fills the whole client area — no fixed size, no letterbox. */
      #unity-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: block; background: #081626; }
      #hlt-loading {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; background: #081626;
        font-family: -apple-system, "Segoe UI", "Noto Sans Thai", sans-serif; color: #e7be5f;
      }
      #hlt-loading .title { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
      #hlt-loading .sub { font-size: 13px; color: #9fb6c9; margin-top: 4px; }
      #hlt-loading .bar { width: 60%; max-width: 300px; height: 8px; background: #0e2236;
        border: 1px solid #21496b; border-radius: 999px; overflow: hidden; margin-top: 16px; }
      #hlt-loading .bar > div { height: 100%; width: 0%; background: #2a9d8f; transition: width .15s; }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" width=1080 height=1920 tabindex="-1"></canvas>
    <div id="hlt-loading">
      <div class="title">Hero Legends Thai</div>
      <div class="sub">ตำนานแห่งมหาสมุทร · กำลังโหลด…</div>
      <div class="bar"><div id="hlt-bar"></div></div>
    </div>
    <script src="Build/WebGLBuild.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/WebGLBuild.data.unityweb",
        frameworkUrl: "Build/WebGLBuild.framework.js.unityweb",
        codeUrl: "Build/WebGLBuild.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "rpg-hero-legends-thai",
        productVersion: "0.1.0",
        // matchWebGLToCanvasSize stays default (true): Unity renders at the canvas display size × DPR — crisp + full-bleed.
      }, (progress) => {
        var b = document.getElementById("hlt-bar");
        if (b) b.style.width = (progress * 100) + "%";
      }).then((unityInstance) => {
        var l = document.getElementById("hlt-loading");
        if (l) l.style.display = "none";
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
